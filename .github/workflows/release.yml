name: Reusable Release

on:
  workflow_call:
    inputs:
      runs-on:
        description: JSON array runner selector for the release job
        required: false
        default: '["self-hosted","linux","shell-only","public"]'
        type: string
      verify-script:
        description: Release verification script path relative to the repository root
        required: false
        default: "scripts/ci/run-release-verification.sh"
        type: string
      version-script:
        description: Optional release version validation/update script path relative to the repository root
        required: false
        default: "scripts/ci/run-release-version.sh"
        type: string
      build-script:
        description: Optional release artifact build script path relative to the repository root
        required: false
        default: "scripts/ci/run-release-build.sh"
        type: string
      publish-script:
        description: Release publish script path relative to the repository root
        required: false
        default: "scripts/ci/run-release-publish.sh"
        type: string
      release-notes-file:
        description: Optional release notes file path produced before GitHub Release creation
        required: false
        default: "dist/release/RELEASE_NOTES.md"
        type: string
      artifact-dir:
        description: Directory whose files are uploaded as GitHub Release assets
        required: false
        default: "dist/release"
        type: string
      default-branch:
        description: Default release branch for new minor and major releases
        required: false
        default: "main"
        type: string
      create-github-release:
        description: Create a GitHub release after publish succeeds
        required: false
        default: false
        type: boolean
      tag-prefix:
        description: Prefix used by exact SemVer release tags
        required: false
        default: "v"
        type: string
      update-major-tag:
        description: Move the floating major tag to the current exact release
        required: false
        default: true
        type: boolean
      update-minor-tag:
        description: Move the floating minor tag to the current exact release
        required: false
        default: true
        type: boolean
    secrets:
      DOCKYARD_DEVELOPER_ID_APPLICATION:
        description: Optional Dockyard Developer ID signing identity for release hooks
        required: false
      DOCKYARD_KEYCHAIN_ACCESS_GROUP:
        description: Optional Dockyard keychain access group for release hooks
        required: false
      DOCKYARD_NOTARY_KEYCHAIN_PROFILE:
        description: Optional Dockyard notarytool keychain profile for release hooks
        required: false
      DOCKYARD_SPARKLE_PRIVATE_KEY_FILE:
        description: Optional Dockyard Sparkle private key file path for release hooks
        required: false
      DOCKYARD_SPARKLE_SIGN_UPDATE:
        description: Optional Dockyard Sparkle sign_update executable path for release hooks
        required: false
      SPARKLE_FRAMEWORK_PATH:
        description: Optional Sparkle framework path used by release hooks
        required: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: release
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    env:
      DOCKYARD_DEVELOPER_ID_APPLICATION: ${{ secrets.DOCKYARD_DEVELOPER_ID_APPLICATION }}
      DOCKYARD_KEYCHAIN_ACCESS_GROUP: ${{ secrets.DOCKYARD_KEYCHAIN_ACCESS_GROUP }}
      DOCKYARD_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.DOCKYARD_NOTARY_KEYCHAIN_PROFILE }}
      DOCKYARD_SPARKLE_PRIVATE_KEY_FILE: ${{ secrets.DOCKYARD_SPARKLE_PRIVATE_KEY_FILE }}
      DOCKYARD_SPARKLE_SIGN_UPDATE: ${{ secrets.DOCKYARD_SPARKLE_SIGN_UPDATE }}
      SPARKLE_FRAMEWORK_PATH: ${{ secrets.SPARKLE_FRAMEWORK_PATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Derive release metadata
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          set -euo pipefail

          prefix="${TAG_PREFIX}"
          tag="${RELEASE_TAG}"
          escaped_prefix="$(printf '%s' "${prefix}" | sed 's/[][(){}.^$*+?|\\-]/\\&/g')"

          semver_component='(0|[1-9][0-9]*)'
          prerelease_identifier='(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)'
          prerelease_pattern="(-${prerelease_identifier}(\.${prerelease_identifier})*)?"
          if [[ ! "${tag}" =~ ^${escaped_prefix}${semver_component}\.${semver_component}\.${semver_component}${prerelease_pattern}$ ]]; then
            echo "Release tag '${tag}' does not match the required SemVer pattern '${prefix}X.Y.Z[-prerelease]'." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          prerelease="${BASH_REMATCH[4]:-}"
          is_prerelease=false
          if [[ -n "${prerelease}" ]]; then
            is_prerelease=true
          fi
          commit="$(git rev-list -n 1 "${tag}")"

          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune

          default_ref="origin/${DEFAULT_BRANCH}"
          maintenance_ref="origin/release/${major}.${minor}"
          allowed=false
          if git merge-base --is-ancestor "${commit}" "${default_ref}"; then
            allowed=true
          elif git show-ref --verify --quiet "refs/remotes/${maintenance_ref}" &&
             git merge-base --is-ancestor "${commit}" "${maintenance_ref}"; then
            allowed=true
          fi

          if [[ "${allowed}" != "true" ]]; then
            echo "Release tag '${tag}' must point at ${default_ref} or ${maintenance_ref}." >&2
            exit 1
          fi

          previous_tag="$(git tag --list "${prefix}[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | grep -v "^${tag}$" | head -n 1 || true)"

          {
            echo "tag=${tag}"
            echo "major=${major}"
            echo "minor=${minor}"
            echo "patch=${patch}"
            echo "is_prerelease=${is_prerelease}"
            echo "commit=${commit}"
            echo "previous_tag=${previous_tag}"
          } >> "${GITHUB_OUTPUT}"
      - name: Verify release contract
        run: |
          if [[ ! -x "${{ inputs.verify-script }}" ]]; then
            echo "Missing executable verify script: ${{ inputs.verify-script }}" >&2
            exit 1
          fi
          bash "${{ inputs.verify-script }}"
      - name: Run release version hook
        run: |
          if [[ -x "${{ inputs.version-script }}" ]]; then
            bash "${{ inputs.version-script }}"
          else
            echo "No executable release version hook is configured: ${{ inputs.version-script }}"
          fi
      - name: Build release artifacts
        run: |
          if [[ -x "${{ inputs.build-script }}" ]]; then
            bash "${{ inputs.build-script }}"
          else
            echo "No executable release artifact build hook is configured: ${{ inputs.build-script }}"
          fi
      - name: Publish release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! -x "${{ inputs.publish-script }}" ]]; then
            echo "Missing executable publish script: ${{ inputs.publish-script }}" >&2
            exit 1
          fi
          bash "${{ inputs.publish-script }}"
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.release_meta.outputs.previous_tag }}
          NOTES_FILE: ${{ inputs.release-notes-file }}
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "${NOTES_FILE}")"

          args=(--method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -f "tag_name=${RELEASE_TAG}")
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          if gh api "${args[@]}" --jq '.body' > "${NOTES_FILE}" && [[ -s "${NOTES_FILE}" ]]; then
            echo "Wrote categorized release notes to ${NOTES_FILE}."
          else
            echo "Falling back to a minimal release notes file for ${RELEASE_TAG}." >&2
            printf '# %s\n' "${RELEASE_TAG}" > "${NOTES_FILE}"
          fi
      - name: Create GitHub release
        if: ${{ inputs.create-github-release }}
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.release_meta.outputs.is_prerelease }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ -z "${tag}" ]]; then
            echo "GITHUB_REF_NAME is required to create a GitHub release." >&2
            exit 1
          fi

          release_create_args=()
          release_edit_args=()
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_create_args=(--prerelease --latest=false)
            release_edit_args=(--prerelease)
          else
            release_edit_args=(--latest)
          fi

          if [[ -s "${{ inputs.release-notes-file }}" ]]; then
            gh release create "${tag}" --notes-file "${{ inputs.release-notes-file }}" "${release_create_args[@]}" ||
              gh release edit "${tag}" --notes-file "${{ inputs.release-notes-file }}" "${release_edit_args[@]}"
          else
            gh release create "${tag}" --generate-notes "${release_create_args[@]}" ||
              gh release edit "${tag}" "${release_edit_args[@]}"
          fi

          artifact_dir="${{ inputs.artifact-dir }}"
          if [[ -d "${artifact_dir}" ]]; then
            mapfile -t assets < <(find "${artifact_dir}" -maxdepth 1 -type f | sort)
            if [[ ${#assets[@]} -gt 0 ]]; then
              gh release upload "${tag}" "${assets[@]}" --clobber
              echo "Uploaded ${#assets[@]} release asset(s) from ${artifact_dir}."
            else
              echo "No release assets found in ${artifact_dir}; skipping asset upload."
            fi
          else
            echo "Artifact directory ${artifact_dir} does not exist; skipping asset upload."
          fi
      - name: Promote floating SemVer tags
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          UPDATE_MAJOR_TAG: ${{ inputs.update-major-tag }}
          UPDATE_MINOR_TAG: ${{ inputs.update-minor-tag }}
          IS_PRERELEASE: ${{ steps.release_meta.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "Skipping floating SemVer tag promotion for prerelease ${RELEASE_TAG}."
            exit 0
          fi

          prefix="${TAG_PREFIX}"
          tag="${RELEASE_TAG}"
          escaped_prefix="$(printf '%s' "${prefix}" | sed 's/[][(){}.^$*+?|\\-]/\\&/g')"

          semver_component='(0|[1-9][0-9]*)'
          if [[ ! "${tag}" =~ ^${escaped_prefix}${semver_component}\.${semver_component}\.${semver_component}$ ]]; then
            echo "Release tag '${tag}' does not match the required exact SemVer pattern '${prefix}X.Y.Z'." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          commit="$(git rev-list -n 1 "${tag}")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "${UPDATE_MINOR_TAG}" == "true" ]]; then
            minor_tag="${prefix}${major}.${minor}"
            git tag -fa "${minor_tag}" "${commit}" -m "Advance ${minor_tag} to ${tag}"
            git push origin "refs/tags/${minor_tag}" --force
          fi

          if [[ "${UPDATE_MAJOR_TAG}" == "true" ]]; then
            major_tag="${prefix}${major}"
            git tag -fa "${major_tag}" "${commit}" -m "Advance ${major_tag} to ${tag}"
            git push origin "refs/tags/${major_tag}" --force
          fi
